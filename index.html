<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - CRM Autopilot Platform</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f4ff',
                            100: '#d9e2ff',
                            200: '#b8caff',
                            300: '#8ca6ff',
                            400: '#5c78ff',
                            500: '#3b52f6',
                            600: '#2535e8',
                            700: '#1d26d0',
                            800: '#1b20aa',
                            900: '#191e87',
                            950: '#101153',
                        },
                        darkBg: '#0f0f11',
                        darkCard: '#18181b',
                        darkBorder: '#27272a',
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar and glassmorphism styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 9999px;
        }
        .light ::-webkit-scrollbar-thumb {
            background: #e4e4e7;
            border-radius: 9999px;
        }
        .glass-panel {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        /* Custom animations */
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.05); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 8s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-zinc-100 font-sans min-h-screen transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ============================================================================
        // ICONS (Custom SVG icons to remove dependency load racing issues)
        // ============================================================================
        const Icons = {
            Sparkles: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 21L7.188 15.904L2 15L7.188 14.096L9 9L9.813 14.096L15 15L9.813 15.904z" />
                    <path strokeLinecap="round" strokeLinejoin="round" d="M19.071 4.929l-1.071 2.678l-2.678 1.071l2.678 1.071l1.071 2.678l1.071-2.678l2.678-1.071l-2.678-1.071z" />
                </svg>
            ),
            Moon: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            ),
            Sun: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
            ),
            Search: () => (
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            ),
            Plus: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            ),
            Info: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            ),
            CheckCircle: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            ),
            XCircle: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            ),
            Trash: () => (
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            ),
            Eye: () => (
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            ),
            Download: () => (
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
            ),
            Clipboard: () => (
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
            ),
            Globe: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
                </svg>
            ),
            LoadingSpinner: ({ className = "w-5 h-5" }) => (
                <svg className={`${className} animate-spin`} fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                </svg>
            )
        };

        // ============================================================================
        // TOAST NOTIFICATIONS
        // ============================================================================
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 5000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const typeStyles = {
                success: 'bg-emerald-500/10 border-emerald-500/20 text-emerald-500',
                error: 'bg-rose-500/10 border-rose-500/20 text-rose-500',
                info: 'bg-brand-500/10 border-brand-500/20 text-brand-500',
            };

            return (
                <div className={`fixed bottom-4 right-4 z-50 flex items-center gap-3 px-4 py-3 rounded-lg border glass-panel shadow-2xl transition-all duration-300 transform translate-y-0 ${typeStyles[type]}`}>
                    {type === 'success' && <Icons.CheckCircle className="w-5 h-5 text-emerald-500" />}
                    {type === 'error' && <Icons.XCircle className="w-5 h-5 text-rose-500" />}
                    {type === 'info' && <Icons.Info className="w-5 h-5 text-brand-500" />}
                    <span className="text-sm font-medium">{message}</span>
                    <button onClick={onClose} className="hover:opacity-70 ml-2">
                        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            );
        };

        // ============================================================================
        // APP CONTAINER
        // ============================================================================
        function App() {
            const [theme, setTheme] = useState('dark');
            const [requirement, setRequirement] = useState('');
            const [userId] = useState(() => 'user-' + Math.random().toString(36).substring(2, 11));
            
            // System Lists & Stats State
            const [systems, setSystems] = useState([]);
            const [stats, setStats] = useState({ totalSystems: 0, liveSystems: 0, totalTables: 0 });
            const [loadingSystems, setLoadingSystems] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [sortBy, setSortBy] = useState('date-desc');
            const [selectedSystem, setSelectedSystem] = useState(null);

            // Active build deployment tracking
            const [currentDeploymentId, setCurrentDeploymentId] = useState(null);
            const [deploymentData, setDeploymentData] = useState(null);
            const [isBuilding, setIsBuilding] = useState(false);

            // Notification Toasts
            const [toasts, setToasts] = useState([]);

            const addToast = (message, type = 'info') => {
                setToasts(prev => [...prev, { id: Date.now(), message, type }]);
            };

            const removeToast = (id) => {
                setToasts(prev => prev.filter(t => t.id !== id));
            };

            // Toggle Dark Mode
            const toggleTheme = () => {
                const root = window.document.documentElement;
                if (theme === 'dark') {
                    root.classList.remove('dark');
                    root.classList.add('light');
                    setTheme('light');
                } else {
                    root.classList.remove('light');
                    root.classList.add('dark');
                    setTheme('dark');
                }
            };

            // Fetch recent systems & stats
            const fetchDashboardData = async () => {
                try {
                    const res = await fetch(`/api/dashboard/systems/${userId}`);
                    const data = await res.json();
                    if (data.success) {
                        setSystems(data.systems || []);
                        setStats({
                            totalSystems: data.totalSystems || 0,
                            liveSystems: data.liveSystems || 0,
                            totalTables: data.totalTables || 0
                        });
                    }
                } catch (err) {
                    console.error('Failed to load dashboard:', err);
                    addToast('Failed to retrieve system status', 'error');
                } finally {
                    setLoadingSystems(false);
                }
            };

            useEffect(() => {
                fetchDashboardData();
            }, []);

            // Handle Build Submission
            const handleBuild = async (e) => {
                e.preventDefault();
                if (!requirement.trim()) {
                    addToast('Please input a system requirement specification.', 'error');
                    return;
                }

                setIsBuilding(true);
                setDeploymentData({
                    progress: 0,
                    steps: [
                        { name: 'Analyzing Requirement', status: 'in_progress', progress: 10 },
                        { name: 'Generating Tables', status: 'pending', progress: 0 },
                        { name: 'Generating Business Rules', status: 'pending', progress: 0 },
                        { name: 'Generating Flows', status: 'pending', progress: 0 },
                        { name: 'Compiling Plugins', status: 'pending', progress: 0 },
                        { name: 'Deploying to D365', status: 'pending', progress: 0 }
                    ]
                });

                try {
                    const res = await fetch('/api/jarvis/build-real', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ requirement, userId })
                    });
                    const data = await res.json();

                    if (data.success) {
                        setCurrentDeploymentId(data.deploymentId);
                        addToast(`Build queued: ${data.systemName || 'JARVIS System'}`, 'success');
                        setRequirement('');
                    } else {
                        addToast(data.error || 'Build process encountered an error', 'error');
                        setIsBuilding(false);
                    }
                } catch (err) {
                    addToast('Could not start provisioning: Network error', 'error');
                    setIsBuilding(false);
                }
            };

            // Track active deployment progress
            useEffect(() => {
                if (!currentDeploymentId) return;

                const interval = setInterval(async () => {
                    try {
                        const res = await fetch(`/api/deployment/${currentDeploymentId}`);
                        const data = await res.json();

                        if (data.success && data.deployment) {
                            const deployment = data.deployment;
                            setDeploymentData(deployment);

                            if (deployment.status === 'completed') {
                                addToast('🎉 Custom table provisioning complete!', 'success');
                                setCurrentDeploymentId(null);
                                setIsBuilding(false);
                                fetchDashboardData();
                            } else if (deployment.status === 'failed') {
                                addToast(`❌ Provisioning failed: ${deployment.error || 'Unknown error'}`, 'error');
                                setCurrentDeploymentId(null);
                                setIsBuilding(false);
                            }
                        }
                    } catch (err) {
                        console.error('Error tracking deployment:', err);
                    }
                }, 1500);

                return () => clearInterval(interval);
            }, [currentDeploymentId]);

            // Filter & Sort Systems
            const processedSystems = useMemo(() => {
                let items = [...systems];

                // Search
                if (searchTerm.trim()) {
                    const query = searchTerm.toLowerCase();
                    items = items.filter(s => 
                        s.name.toLowerCase().includes(query) || 
                        s.description.toLowerCase().includes(query)
                    );
                }

                // Sort
                items.sort((a, b) => {
                    if (sortBy === 'name-asc') return a.name.localeCompare(b.name);
                    if (sortBy === 'name-desc') return b.name.localeCompare(a.name);
                    if (sortBy === 'date-asc') return new Date(a.createdAt) - new Date(b.createdAt);
                    // Default date-desc
                    return new Date(b.createdAt) - new Date(a.createdAt);
                });

                return items;
            }, [systems, searchTerm, sortBy]);

            const wordCount = requirement.trim() ? requirement.trim().split(/\s+/).length : 0;
            const charCount = requirement.length;

            return (
                <div className="min-h-screen flex flex-col relative overflow-hidden bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-zinc-100 transition-colors duration-300">
                    {/* Background glows */}
                    <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-indigo-500/10 rounded-full blur-[120px] pointer-events-none animate-pulse-slow"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-purple-500/10 rounded-full blur-[120px] pointer-events-none animate-pulse-slow"></div>

                    {/* Toast notifications */}
                    {toasts.map(toast => (
                        <Toast 
                            key={toast.id} 
                            message={toast.message} 
                            type={toast.type} 
                            onClose={() => removeToast(toast.id)} 
                        />
                    ))}

                    {/* HEADER */}
                    <header className="sticky top-0 z-40 border-b border-gray-200 dark:border-darkBorder bg-white/70 dark:bg-darkCard/70 backdrop-blur-md transition-colors duration-300">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-tr from-brand-500 to-purple-600 p-2 rounded-xl text-white shadow-lg shadow-brand-500/20">
                                    <Icons.Sparkles />
                                </div>
                                <div>
                                    <h1 className="font-outfit font-extrabold text-xl tracking-tight bg-gradient-to-r from-brand-500 to-purple-600 bg-clip-text text-transparent">
                                        JARVIS
                                    </h1>
                                    <p className="text-[10px] text-gray-500 dark:text-zinc-400 font-medium tracking-widest uppercase">
                                        CRM Autopilot
                                    </p>
                                </div>
                            </div>

                            <div className="flex items-center gap-4">
                                <div className="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full border border-gray-200 dark:border-darkBorder bg-gray-50 dark:bg-zinc-800 text-xs font-semibold text-gray-600 dark:text-zinc-300">
                                    <Icons.Globe />
                                    <span>Dynamics 365 Connected</span>
                                </div>

                                <button 
                                    onClick={toggleTheme}
                                    className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-zinc-800 text-gray-500 dark:text-zinc-400 transition-colors"
                                    title="Toggle theme"
                                >
                                    {theme === 'dark' ? <Icons.Sun /> : <Icons.Moon />}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* MAIN CONTAINER */}
                    <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col gap-8 z-10">
                        
                        {/* DEPLOYMENT PROGRESS BAR (ACTIVE STATE) */}
                        {isBuilding && deploymentData && (
                            <div className="bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-2xl p-6 shadow-xl relative overflow-hidden transition-all duration-500">
                                <div className="absolute top-0 left-0 h-1 bg-gradient-to-r from-brand-500 to-purple-600 transition-all duration-500" style={{ width: `${deploymentData.progress}%` }}></div>
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                                    <div>
                                        <h3 className="font-outfit font-bold text-lg flex items-center gap-2 text-brand-500">
                                            <Icons.LoadingSpinner className="w-5 h-5" />
                                            Active System Deployment
                                        </h3>
                                        <p className="text-sm text-gray-500 dark:text-zinc-400 mt-1">
                                            Creating custom tables, provisioning schema columns and security groups in Dataverse.
                                        </p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="text-right">
                                            <span className="text-2xl font-extrabold font-outfit text-gray-800 dark:text-zinc-100">
                                                {deploymentData.progress}%
                                            </span>
                                            <p className="text-[10px] uppercase font-bold text-zinc-400">Progress</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Step Sequence Grid */}
                                <div className="grid grid-cols-2 md:grid-cols-6 gap-4">
                                    {deploymentData.steps.map((step, idx) => {
                                        const isCompleted = step.status === 'completed';
                                        const isInProgress = step.status === 'in_progress';
                                        
                                        return (
                                            <div 
                                                key={idx} 
                                                className={`p-3 rounded-xl border transition-all duration-300 ${
                                                    isCompleted 
                                                        ? 'bg-emerald-500/5 border-emerald-500/20 text-emerald-600 dark:text-emerald-400' 
                                                        : isInProgress 
                                                            ? 'bg-brand-500/5 border-brand-500/20 text-brand-600 dark:text-brand-400 animate-pulse'
                                                            : 'bg-gray-100/50 border-gray-200 dark:bg-zinc-800/20 dark:border-darkBorder text-gray-400 dark:text-zinc-500'
                                                }`}
                                            >
                                                <div className="flex items-center justify-between mb-2">
                                                    <span className="text-xs font-bold uppercase tracking-wider opacity-60">Step {idx + 1}</span>
                                                    {isCompleted ? (
                                                        <Icons.CheckCircle className="w-4 h-4 text-emerald-500" />
                                                    ) : isInProgress ? (
                                                        <Icons.LoadingSpinner className="w-4 h-4 text-brand-500" />
                                                    ) : (
                                                        <span className="w-3.5 h-3.5 rounded-full border-2 border-gray-300 dark:border-zinc-600"></span>
                                                    )}
                                                </div>
                                                <p className="text-xs font-semibold line-clamp-2">{step.name}</p>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* DASHBOARD STATISTICS CARDS */}
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                            <div className="bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-2xl p-6 shadow-md hover:border-brand-500/20 transition-all">
                                <div className="flex items-center justify-between mb-4">
                                    <span className="text-sm font-semibold text-gray-500 dark:text-zinc-400">Total Systems Built</span>
                                    <div className="p-2 rounded-lg bg-brand-500/10 text-brand-500"><Icons.Sparkles /></div>
                                </div>
                                <h3 className="text-3xl font-extrabold font-outfit text-gray-800 dark:text-zinc-100">{stats.totalSystems}</h3>
                            </div>
                            <div className="bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-2xl p-6 shadow-md hover:border-brand-500/20 transition-all">
                                <div className="flex items-center justify-between mb-4">
                                    <span className="text-sm font-semibold text-gray-500 dark:text-zinc-400">Live Systems</span>
                                    <div className="p-2 rounded-lg bg-emerald-500/10 text-emerald-500">
                                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                        </svg>
                                    </div>
                                </div>
                                <h3 className="text-3xl font-extrabold font-outfit text-gray-800 dark:text-zinc-100">{stats.liveSystems}</h3>
                            </div>
                            <div className="bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-2xl p-6 shadow-md hover:border-brand-500/20 transition-all">
                                <div className="flex items-center justify-between mb-4">
                                    <span className="text-sm font-semibold text-gray-500 dark:text-zinc-400">Total Tables Created</span>
                                    <div className="p-2 rounded-lg bg-purple-500/10 text-purple-500">
                                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
                                        </svg>
                                    </div>
                                </div>
                                <h3 className="text-3xl font-extrabold font-outfit text-gray-800 dark:text-zinc-100">{stats.totalTables}</h3>
                            </div>
                        </div>

                        {/* DASHBOARD CORE LAYOUT: Split view */}
                        <div className="grid grid-cols-1 lg:grid-cols-10 gap-8">
                            
                            {/* LEFT SIDEBAR (40%): Inputs */}
                            <div className="lg:col-span-4 flex flex-col gap-6">
                                <div className="bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-2xl p-6 shadow-md">
                                    <h3 className="font-outfit font-bold text-lg mb-4 text-gray-800 dark:text-zinc-100 flex items-center gap-2">
                                        <Icons.Plus />
                                        Provision New Solution
                                    </h3>
                                    
                                    <form onSubmit={handleBuild} className="flex flex-col gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-zinc-400 mb-2">
                                                System Requirements Specification
                                            </label>
                                            <textarea 
                                                value={requirement}
                                                onChange={(e) => setRequirement(e.target.value)}
                                                placeholder="Provide detailed natural language requirements (e.g. Create a customer management system with name, email, phone...)"
                                                rows={8}
                                                className="w-full p-4 rounded-xl border border-gray-200 dark:border-darkBorder bg-gray-50 dark:bg-zinc-900/50 text-sm font-mono focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all"
                                                disabled={isBuilding}
                                            />
                                            <div className="flex items-center justify-between mt-2 text-xs text-gray-500 dark:text-zinc-400 font-medium">
                                                <span>Characters: {charCount}</span>
                                                <span>Words: {wordCount}</span>
                                            </div>
                                        </div>

                                        <button 
                                            type="submit"
                                            disabled={isBuilding || !requirement.trim()}
                                            className={`w-full py-3.5 px-4 rounded-xl font-semibold text-sm transition-all duration-300 shadow-lg flex items-center justify-center gap-2 ${
                                                isBuilding || !requirement.trim()
                                                    ? 'bg-gray-200 text-gray-400 dark:bg-zinc-800 dark:text-zinc-600 cursor-not-allowed shadow-none'
                                                    : 'bg-gradient-to-r from-brand-500 to-purple-600 hover:from-brand-600 hover:to-purple-700 text-white shadow-brand-500/20 hover:shadow-brand-500/30'
                                            }`}
                                        >
                                            {isBuilding ? (
                                                <>
                                                    <Icons.LoadingSpinner className="w-5 h-5 text-white" />
                                                    Provisioning Environment...
                                                </>
                                            ) : (
                                                <>
                                                    <Icons.Sparkles />
                                                    Provision & Deploy
                                                </>
                                            )}
                                        </button>
                                    </form>
                                </div>
                            </div>

                            {/* RIGHT GRID (60%): Systems List */}
                            <div className="lg:col-span-6 flex flex-col gap-6">
                                
                                {/* Filters Bar */}
                                <div className="bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-2xl p-4 shadow-sm flex flex-col sm:flex-row items-center justify-between gap-4">
                                    <div className="relative w-full sm:w-72">
                                        <input 
                                            type="text"
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            placeholder="Search active systems..."
                                            className="w-full pl-10 pr-4 py-2 text-sm rounded-lg border border-gray-200 dark:border-darkBorder bg-gray-50 dark:bg-zinc-900/50 outline-none focus:ring-1 focus:ring-brand-500"
                                        />
                                        <div className="absolute left-3 top-3 text-gray-400">
                                            <Icons.Search />
                                        </div>
                                    </div>

                                    <div className="flex items-center gap-2 w-full sm:w-auto">
                                        <span className="text-xs font-semibold text-gray-400 whitespace-nowrap">Sort by</span>
                                        <select 
                                            value={sortBy}
                                            onChange={(e) => setSortBy(e.target.value)}
                                            className="w-full sm:w-auto text-sm px-3 py-2 rounded-lg border border-gray-200 dark:border-darkBorder bg-white dark:bg-zinc-800 outline-none"
                                        >
                                            <option value="date-desc">Newest First</option>
                                            <option value="date-asc">Oldest First</option>
                                            <option value="name-asc">Name (A-Z)</option>
                                            <option value="name-desc">Name (Z-A)</option>
                                        </select>
                                    </div>
                                </div>

                                {/* Systems List */}
                                {loadingSystems ? (
                                    // Skeletons
                                    <div className="flex flex-col gap-4">
                                        {[1, 2, 3].map(i => (
                                            <div key={i} className="animate-pulse bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-2xl p-6 h-32"></div>
                                        ))}
                                    </div>
                                ) : processedSystems.length === 0 ? (
                                    // Empty State
                                    <div className="bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-2xl p-12 text-center shadow-sm">
                                        <div className="w-16 h-16 bg-gray-100 dark:bg-zinc-800 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-400">
                                            <Icons.Sparkles />
                                        </div>
                                        <h4 className="font-outfit font-bold text-lg mb-1 text-gray-800 dark:text-zinc-100">No Custom Systems Found</h4>
                                        <p className="text-sm text-gray-500 dark:text-zinc-400 max-w-sm mx-auto">
                                            Input details in the specification panel to generate and deploy your first Dataverse system.
                                        </p>
                                    </div>
                                ) : (
                                    <div className="flex flex-col gap-4">
                                        {processedSystems.map(system => (
                                            <div 
                                                key={system.id} 
                                                className="bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-2xl p-6 shadow-sm hover:shadow-md transition-all flex items-center justify-between gap-6"
                                            >
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-2.5 mb-1.5">
                                                        <h4 className="font-outfit font-bold text-lg text-gray-800 dark:text-zinc-100 truncate">
                                                            {system.name}
                                                        </h4>
                                                        <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-emerald-500/10 text-emerald-600 dark:text-emerald-400">
                                                            LIVE
                                                        </span>
                                                    </div>
                                                    <p className="text-sm text-gray-500 dark:text-zinc-400 line-clamp-1 mb-4">
                                                        {system.description}
                                                    </p>

                                                    <div className="flex flex-wrap items-center gap-3">
                                                        <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg border border-gray-200 dark:border-darkBorder text-xs font-semibold text-gray-600 dark:text-zinc-300">
                                                            📊 {system.tables || 0} Tables
                                                        </span>
                                                        <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg border border-gray-200 dark:border-darkBorder text-xs font-semibold text-gray-600 dark:text-zinc-300">
                                                            📋 {system.rules || 0} Rules
                                                        </span>
                                                        <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg border border-gray-200 dark:border-darkBorder text-xs font-semibold text-gray-600 dark:text-zinc-300">
                                                            🔄 {system.flows || 0} Flows
                                                        </span>
                                                    </div>
                                                </div>

                                                <div className="flex items-center gap-2">
                                                    <button 
                                                        onClick={() => setSelectedSystem(system)}
                                                        className="p-2.5 rounded-lg border border-gray-200 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-zinc-800 text-gray-500 dark:text-zinc-400 transition-colors"
                                                        title="View Spec Details"
                                                    >
                                                        <Icons.Eye />
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* MODAL / DRAWER SYSTEM DETAIL VIEW */}
                    {selectedSystem && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                            <div className="bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-2xl w-full max-w-3xl overflow-hidden shadow-2xl animate-in fade-in zoom-in-95 duration-200">
                                <div className="px-6 py-5 border-b border-gray-200 dark:border-darkBorder flex items-center justify-between">
                                    <div>
                                        <h3 className="font-outfit font-extrabold text-xl text-gray-800 dark:text-zinc-100">
                                            {selectedSystem.name}
                                        </h3>
                                        <p className="text-xs text-gray-500 dark:text-zinc-400 mt-1">
                                            Registered System ID: <span className="font-mono">{selectedSystem.id}</span>
                                        </p>
                                    </div>
                                    <button 
                                        onClick={() => setSelectedSystem(null)}
                                        className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-zinc-800 text-gray-500 dark:text-zinc-400 transition-colors"
                                    >
                                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>

                                <div className="p-6 overflow-y-auto max-h-[70vh] flex flex-col gap-6">
                                    <div>
                                        <h4 className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Description</h4>
                                        <p className="text-sm text-gray-600 dark:text-zinc-300 leading-relaxed bg-gray-50 dark:bg-zinc-900/50 p-4 rounded-xl border border-gray-200 dark:border-darkBorder">
                                            {selectedSystem.description}
                                        </p>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-gray-50 dark:bg-zinc-900/50 p-4 rounded-xl border border-gray-200 dark:border-darkBorder">
                                            <h4 className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Metadata Summary</h4>
                                            <div className="flex flex-col gap-2 text-sm">
                                                <div className="flex justify-between"><span className="text-gray-500 dark:text-zinc-400">Total Tables:</span><span className="font-bold">{selectedSystem.tables || 0}</span></div>
                                                <div className="flex justify-between"><span className="text-gray-500 dark:text-zinc-400">Business Rules:</span><span className="font-bold">{selectedSystem.rules || 0}</span></div>
                                                <div className="flex justify-between"><span className="text-gray-500 dark:text-zinc-400 font-medium">Power Automate Flows:</span><span className="font-bold">{selectedSystem.flows || 0}</span></div>
                                            </div>
                                        </div>

                                        <div className="bg-gray-50 dark:bg-zinc-900/50 p-4 rounded-xl border border-gray-200 dark:border-darkBorder flex flex-col justify-between">
                                            <div>
                                                <h4 className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Export Operations</h4>
                                                <p className="text-xs text-gray-500 dark:text-zinc-400">Download structural schema JSON metadata payload.</p>
                                            </div>
                                            <div className="flex gap-2 mt-4">
                                                <button 
                                                    onClick={() => {
                                                        navigator.clipboard.writeText(JSON.stringify(selectedSystem, null, 2));
                                                        addToast('Schema clipboard copied!', 'success');
                                                    }}
                                                    className="flex-1 py-2 px-3 border border-gray-200 dark:border-darkBorder rounded-lg text-xs font-semibold hover:bg-gray-50 dark:hover:bg-zinc-800 transition flex items-center justify-center gap-1.5"
                                                >
                                                    <Icons.Clipboard /> Copy
                                                </button>
                                                <button 
                                                    onClick={() => {
                                                        const blob = new Blob([JSON.stringify(selectedSystem, null, 2)], { type: 'application/json' });
                                                        const url = URL.createObjectURL(blob);
                                                        const a = document.createElement('a');
                                                        a.href = url;
                                                        a.download = `${selectedSystem.name.toLowerCase()}-schema.json`;
                                                        a.click();
                                                        addToast('JSON schema export downloaded', 'success');
                                                    }}
                                                    className="flex-1 py-2 px-3 bg-brand-500 hover:bg-brand-600 text-white rounded-lg text-xs font-semibold transition flex items-center justify-center gap-1.5 shadow-md shadow-brand-500/10"
                                                >
                                                    <Icons.Download /> Export JSON
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Render React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
